<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position</title>
    <style>
        .parent {
            position: relative; /* 基準点になる */
            width: 300px;
            height: 300px;
            background-color: blue;
        }
        .child {
            position: absolute; /* 親の基準に配置 */
            width: 50px;
            height: 50px;
            bottom: 0;
            right: 0; /* 右下に配置 */
            background-color: green;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="child"></div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag-free Kanban Board</title>
    <style>
        .board {
            display: flex;
            gap: 20px;
        }
        .column {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="board">
        <div class="column">
            <h3>To Do</h3>
            <ul id="todo"></ul>
            <input type="text" id="todo-input">
            <button id="todo-add">Add</button>
        </div>
        <div class="column">
            <h3>In Progress</h3>
            <ul id="progress"></ul>
            <input type="text" id="progress-input">
            <button id="progress-add">Add</button>
        </div>
        <div class="column">
            <h3>Done</h3>
            <ul id="done"></ul>
            <input type="text" id="done-input">
            <button id="done-add">Add</button>
        </div>
    </div>
    <script>
        let index = 0;
        const column = [
            document.getElementById("todo"),
            document.getElementById("progress"),
            document.getElementById("done")
        ];
        
        const todo_input = document.getElementById("todo-input");
        const progress_input = document.getElementById("progress-input"); 
        const done_input = document.getElementById("done-input");

        const btn_todo = document.getElementById("todo-add");
        const btn_progress = document.getElementById("progress-add");
        const btn_done = document.getElementById("done-add");

        function createTask(input, colIndex) {
            if (input.value !== "") {
                const li = document.createElement("li");
                const btnRight = document.createElement("button");
                const btnLeft = document.createElement("button");

                li.textContent = input.value;
                btnLeft.textContent = "←";
                btnRight.textContent = "→";

                column[colIndex].appendChild(li);
                li.appendChild(btnLeft);
                li.appendChild(btnRight);

                input.value = "";

                btnRight.addEventListener("click", function() {
                    index = column.indexOf(li.parentElement);
                    if (index !== column.length - 1) {
                        column[index + 1].appendChild(li);
                    }
                });
                btnLeft.addEventListener("click", function() {
                    index = column.indexOf(li.parentElement);
                    if (index !== 0) {
                        column[index - 1].appendChild(li);
                    }
                });
            }
        }
        
        btn_todo.addEventListener("click", () => createTask(todo_input, 0) );
        btn_progress.addEventListener("click", () => createTask(progress_input, 1) );
        btn_done.addEventListener("click", () => createTask(done_input, 2) );
    </script>
</body>
</html>
